<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .box { stroke: #334155; stroke-width: 2; rx: 22; ry: 22; }
      .t1 { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .t2 { font: 16px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="520" fill="#ffffff"/>
  <text x="750" y="55" text-anchor="middle" class="title">Live Pipe Sensing Demo</text>

  <rect x="60" y="170" width="260" height="120" class="box" fill="#e0f2fe"/>
  <text x="190" y="210" text-anchor="middle" class="t1">Pipe with Running Water</text>
  <text x="190" y="242" text-anchor="middle" class="t2">Normal flow or</text>
  <text x="190" y="266" text-anchor="middle" class="t2">abnormal leak sound</text>

  <rect x="370" y="170" width="250" height="120" class="box" fill="#dcfce7"/>
  <text x="495" y="210" text-anchor="middle" class="t1">Microphone / Sound Sensor</text>
  <text x="495" y="242" text-anchor="middle" class="t2">Reads pipe sound</text>
  <text x="495" y="266" text-anchor="middle" class="t2">in real time</text>

  <rect x="670" y="170" width="230" height="120" class="box" fill="#fef3c7"/>
  <text x="785" y="210" text-anchor="middle" class="t1">ESP32 Signal Read</text>
  <text x="785" y="242" text-anchor="middle" class="t2">Analog input</text>
  <text x="785" y="266" text-anchor="middle" class="t2">live sensing</text>

  <rect x="950" y="170" width="250" height="120" class="box" fill="#ede9fe"/>
  <text x="1075" y="210" text-anchor="middle" class="t1">Sound Level and</text>
  <text x="1075" y="236" text-anchor="middle" class="t1">Threshold Logic</text>
  <text x="1075" y="266" text-anchor="middle" class="t2">Level calculation</text>

  <rect x="1250" y="170" width="210" height="120" class="box" fill="#fee2e2"/>
  <text x="1355" y="210" text-anchor="middle" class="t1">LED Output and</text>
  <text x="1355" y="236" text-anchor="middle" class="t1">Serial Monitor</text>
  <text x="1355" y="266" text-anchor="middle" class="t2">Live response</text>

  <line x1="320" y1="230" x2="370" y2="230" class="arrow"/>
  <line x1="620" y1="230" x2="670" y2="230" class="arrow"/>
  <line x1="900" y1="230" x2="950" y2="230" class="arrow"/>
  <line x1="1200" y1="230" x2="1250" y2="230" class="arrow"/>
</svg>
