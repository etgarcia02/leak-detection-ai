<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .box { stroke: #334155; stroke-width: 2; rx: 22; ry: 22; }
      .t1 { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .t2 { font: 16px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="520" fill="#ffffff"/>
  <text x="750" y="55" text-anchor="middle" class="title">Embedded ML Demo on ESP32</text>

  <rect x="60" y="170" width="270" height="120" class="box" fill="#e0f2fe"/>
  <text x="195" y="210" text-anchor="middle" class="t1">Example Leak / No-Leak</text>
  <text x="195" y="236" text-anchor="middle" class="t1">Feature Data</text>
  <text x="195" y="266" text-anchor="middle" class="t2">Representative input</text>

  <rect x="380" y="170" width="230" height="120" class="box" fill="#dcfce7"/>
  <text x="495" y="210" text-anchor="middle" class="t1">Feature Normalization</text>
  <text x="495" y="242" text-anchor="middle" class="t2">Mean / std scaling</text>
  <text x="495" y="266" text-anchor="middle" class="t2">scaler_params.h</text>

  <rect x="660" y="170" width="270" height="120" class="box" fill="#fef3c7"/>
  <text x="795" y="210" text-anchor="middle" class="t1">TensorFlow Lite Model</text>
  <text x="795" y="236" text-anchor="middle" class="t1">on ESP32</text>
  <text x="795" y="266" text-anchor="middle" class="t2">Binary leak model</text>

  <rect x="980" y="170" width="190" height="120" class="box" fill="#ede9fe"/>
  <text x="1075" y="210" text-anchor="middle" class="t1">Leak Probability</text>
  <text x="1075" y="242" text-anchor="middle" class="t2">0 to 1 output</text>

  <rect x="1220" y="170" width="220" height="120" class="box" fill="#fee2e2"/>
  <text x="1330" y="210" text-anchor="middle" class="t1">LED Output and</text>
  <text x="1330" y="236" text-anchor="middle" class="t1">Prediction Display</text>
  <text x="1330" y="266" text-anchor="middle" class="t2">Leak / no leak</text>

  <line x1="330" y1="230" x2="380" y2="230" class="arrow"/>
  <line x1="610" y1="230" x2="660" y2="230" class="arrow"/>
  <line x1="930" y1="230" x2="980" y2="230" class="arrow"/>
  <line x1="1170" y1="230" x2="1220" y2="230" class="arrow"/>
</svg>
